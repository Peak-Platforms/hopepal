<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRM Ministry Inbox — Kevin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lora', serif;
    background: #0a0c0b; color: #e0d8c8;
    min-height: 100vh;
  }

  header {
    background: #0d0f0e;
    border-bottom: 2px solid #b22234;
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .header-left {
    font-family: 'Oswald', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.08em; color: #f0e8d8;
  }
  .header-left span { color: #b22234; }
  .header-right {
    display: flex; align-items: center; gap: 1rem;
  }
  .inbox-badge {
    background: #b22234; color: white;
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem; letter-spacing: 0.1em;
    padding: 0.3rem 0.7rem;
  }
  #unread-count { display: none; }

  /* LOGIN */
  .login-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 60px);
    padding: 2rem;
  }
  .login-card {
    background: #111412;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 3rem; width: 100%; max-width: 380px;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    position: relative;
  }
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    background: #b22234;
  }
  .login-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.5rem; font-weight: 600;
    color: #f0e8d8; margin-bottom: 0.4rem;
  }
  .login-sub {
    font-size: 0.82rem; font-style: italic;
    color: #6a7a72; margin-bottom: 2rem;
  }
  .login-card input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e8e0d0;
    padding: 0.8rem 1rem;
    font-family: 'Lora', serif; font-size: 0.9rem;
    outline: none; margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: rgba(178,34,52,0.5); }
  .login-btn {
    width: 100%;
    background: #b22234; color: white; border: none;
    padding: 0.9rem;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: #8b1a26; }
  .login-error {
    color: #b22234; font-size: 0.8rem;
    margin-top: 0.8rem; display: none;
  }

  /* INBOX */
  .inbox-wrap { display: none; }

  .inbox-toolbar {
    background: #0d0f0e;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; flex-wrap: wrap;
  }
  .filter-tabs {
    display: flex; gap: 0.5rem;
  }
  .filter-tab {
    font-family: 'Oswald', sans-serif;
    font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none; border: 1px solid rgba(255,255,255,0.12);
    color: #6a7a72; padding: 0.4rem 0.9rem;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-tab:hover, .filter-tab.active {
    border-color: #b22234; color: #b22234;
  }
  .refresh-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none; border: 1px solid rgba(255,255,255,0.12);
    color: #6a7a72; padding: 0.4rem 0.9rem;
    cursor: pointer; transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: #b22234; color: #b22234; }

  .messages-list {
    max-width: 800px; margin: 2rem auto;
    padding: 0 2rem;
    display: flex; flex-direction: column; gap: 1rem;
  }

  .msg-card {
    background: #111412;
    border: 1px solid rgba(255,255,255,0.07);
    padding: 1.5rem;
    transition: border-color 0.2s;
    position: relative;
  }
  .msg-card.unread {
    border-left: 3px solid #b22234;
  }
  .msg-card:hover { border-color: rgba(178,34,52,0.3); }

  .msg-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 1rem;
    margin-bottom: 0.8rem;
  }
  .msg-from {
    font-family: 'Oswald', sans-serif;
    font-size: 0.95rem; font-weight: 500;
    color: #f0e8d8;
  }
  .msg-meta {
    display: flex; gap: 0.5rem; align-items: center;
    flex-wrap: wrap; justify-content: flex-end;
  }
  .msg-category {
    font-family: 'Oswald', sans-serif;
    font-size: 0.62rem; letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(178,34,52,0.4);
    color: #b22234; padding: 0.2rem 0.6rem;
  }
  .msg-time {
    font-size: 0.72rem; color: #4a5a52;
  }
  .msg-region {
    font-size: 0.75rem; color: #5a6a62;
    font-style: italic; margin-bottom: 0.5rem;
  }
  .msg-body {
    font-size: 0.9rem; line-height: 1.8;
    color: #a0a890;
  }
  .msg-email {
    font-size: 0.75rem; color: #5a6a62;
    margin-top: 0.6rem;
    font-style: italic;
  }
  .msg-actions {
    display: flex; gap: 0.5rem; margin-top: 1rem;
  }
  .action-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 0.62rem; letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: #6a7a72; padding: 0.35rem 0.8rem;
    cursor: pointer; transition: all 0.2s;
  }
  .action-btn:hover { border-color: #b22234; color: #b22234; }
  .action-btn.resolved {
    border-color: rgba(100,180,100,0.3);
    color: rgba(100,180,100,0.7);
  }

  .empty-state {
    text-align: center; padding: 5rem 2rem;
    color: #4a5a52;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p {
    font-style: italic; font-size: 0.9rem;
  }

  footer {
    text-align: center; padding: 2rem;
    font-size: 0.72rem; color: rgba(255,255,255,0.15);
    border-top: 1px solid rgba(255,255,255,0.05);
    margin-top: 3rem;
  }

  @media (max-width: 520px) {
    .messages-list { padding: 0 1rem; }
    .msg-header { flex-direction: column; gap: 0.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">PRM <span>INBOX</span> — Kevin</div>
  <div class="header-right">
    <span class="inbox-badge" id="unread-count">0 New</span>
  </div>
</header>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h2 class="login-title">Ministry Inbox</h2>
    <p class="login-sub">Private access — Patriot Rider Ministries</p>
    <input type="password" id="pass-input" placeholder="Access code" onkeydown="if(event.key==='Enter') login()"/>
    <button class="login-btn" onclick="login()">Enter Inbox →</button>
    <p class="login-error" id="login-error">Incorrect access code. Try again.</p>
  </div>
</div>

<!-- INBOX -->
<div class="inbox-wrap" id="inbox-wrap">
  <div class="inbox-toolbar">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('unread', this)">Unread</button>
      <button class="filter-tab" onclick="setFilter('prayer', this)">Prayer</button>
      <button class="filter-tab" onclick="setFilter('firstresponder', this)">First Responders</button>
    </div>
    <button class="refresh-btn" onclick="loadMessages()">↻ Refresh</button>
  </div>

  <div class="messages-list" id="messages-list">
    <div class="empty-state">
      <div class="icon">📭</div>
      <p>Loading messages...</p>
    </div>
  </div>
</div>

<footer>Patriot Rider Ministries · Private Ministry Inbox · Powered by HopePal</footer>

<script>
  const BASE_URL = 'https://hopepal-production.up.railway.app';
  const MINISTRY_ID = 'prm';
  // Change this to your own access code
  const ACCESS_CODE = 'prm2026';

  let allMessages = [];
  let currentFilter = 'all';

  function login() {
    const val = document.getElementById('pass-input').value;
    if (val === ACCESS_CODE) {
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('inbox-wrap').style.display = 'block';
      loadMessages();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderMessages();
  }

  async function loadMessages() {
    try {
      const res = await fetch(`${BASE_URL}/ministry-messages/${MINISTRY_ID}`);
      if (res.ok) {
        allMessages = await res.json();
        renderMessages();
        updateUnreadCount();
      } else {
        showEmpty('Could not load messages. Check connection.');
      }
    } catch (err) {
      // Show sample messages for demo if server not yet configured
      allMessages = getSampleMessages();
      renderMessages();
      updateUnreadCount();
    }
  }

  function getSampleMessages() {
    return [
      {
        id: '1', read: false, resolved: false,
        senderName: 'Mike T.', region: 'TX',
        category: 'prayer', email: '',
        message: "Just lost my buddy on a run last week. Could use some prayer. Riding has been my therapy for 20 years and I'm not sure what to do right now.",
        timestamp: new Date(Date.now() - 3600000).toISOString()
      },
      {
        id: '2', read: false, resolved: false,
        senderName: 'Ray C.', region: 'OK',
        category: 'firstresponder', email: 'rayc@email.com',
        message: "Retired firefighter here — 27 years on the job. Heard about Freedom Ranch and wanted to learn more about what you're building out there in NM.",
        timestamp: new Date(Date.now() - 86400000).toISOString()
      },
      {
        id: '3', read: true, resolved: false,
        senderName: 'Sandra M.', region: 'NM',
        category: 'fellowship', email: '',
        message: "My husband is a rider and a vet. He doesn't talk much but he saw your site and said he wanted to reach out. Looking for community. Any rides coming up in northern NM?",
        timestamp: new Date(Date.now() - 172800000).toISOString()
      }
    ];
  }

  function updateUnreadCount() {
    const unread = allMessages.filter(m => !m.read).length;
    const badge = document.getElementById('unread-count');
    if (unread > 0) {
      badge.style.display = 'block';
      badge.textContent = `${unread} New`;
    }
  }

  function renderMessages() {
    const list = document.getElementById('messages-list');
    let msgs = allMessages;

    if (currentFilter === 'unread') msgs = msgs.filter(m => !m.read);
    else if (currentFilter !== 'all') msgs = msgs.filter(m => m.category === currentFilter);

    if (msgs.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No messages in this category.</p></div>`;
      return;
    }

    list.innerHTML = msgs.map(m => `
      <div class="msg-card ${!m.read ? 'unread' : ''}" id="msg-${m.id}">
        <div class="msg-header">
          <div class="msg-from">${escHtml(m.senderName || 'Anonymous Rider')}</div>
          <div class="msg-meta">
            <span class="msg-category">${formatCategory(m.category)}</span>
            <span class="msg-time">${formatTime(m.timestamp)}</span>
          </div>
        </div>
        ${m.region ? `<div class="msg-region">📍 ${escHtml(m.region)}</div>` : ''}
        <div class="msg-body">${escHtml(m.message)}</div>
        ${m.email ? `<div class="msg-email">Reply to: ${escHtml(m.email)}</div>` : ''}
        <div class="msg-actions">
          ${!m.read ? `<button class="action-btn" onclick="markRead('${m.id}')">✓ Mark Read</button>` : ''}
          ${!m.resolved ? `<button class="action-btn" onclick="markResolved('${m.id}')">🙏 Prayed / Resolved</button>` : '<button class="action-btn resolved" disabled>✓ Resolved</button>'}
        </div>
      </div>
    `).join('');
  }

  async function markRead(id) {
    const msg = allMessages.find(m => m.id === id);
    if (msg) { msg.read = true; renderMessages(); updateUnreadCount(); }
    try { await fetch(`${BASE_URL}/ministry-message/${id}/read`, { method: 'POST' }); } catch(e) {}
  }

  async function markResolved(id) {
    const msg = allMessages.find(m => m.id === id);
    if (msg) { msg.resolved = true; msg.read = true; renderMessages(); updateUnreadCount(); }
    try { await fetch(`${BASE_URL}/ministry-message/${id}/resolve`, { method: 'POST' }); } catch(e) {}
  }

  function formatCategory(cat) {
    const map = { prayer: 'Prayer', fellowship: 'Fellowship', veteran: 'Veteran', firstresponder: 'First Responder', ministry: 'Ministry', other: 'General', general: 'General' };
    return map[cat] || cat;
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 3600000) return `${Math.round(diff/60000)}m ago`;
    if (diff < 86400000) return `${Math.round(diff/3600000)}h ago`;
    return d.toLocaleDateString();
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
