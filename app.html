<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Loading…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f0f0; color: #222; }
    a { text-decoration: none; }
    .chat-container { width: 100%; max-width: 480px; margin: 16px auto; border: 1px solid #111; border-radius: 10px; background: #fff; display: flex; flex-direction: column; min-height: calc(100vh - 32px); }
    .chat-header { display: flex; align-items: center; gap: 10px; color: #FDF9D8; padding: 12px 14px; font-weight: 600; border-radius: 10px 10px 0 0; }
    .header-title { font-size: 16px; font-weight: 700; white-space: nowrap; color: #FDF9D8; }
    .live-badge { margin-left: auto; font-size: 12px; font-weight: 800; padding: 5px 10px; border-radius: 999px; white-space: nowrap; border: 1px solid rgba(255,255,255,0.4); transition: all 0.25s ease; }
    .live-badge.live { background: #ff2d2d; color: #fff; box-shadow: 0 0 8px rgba(255,45,45,0.8); }
    .live-badge.offline { background: #666; color: #eee; }
    .live-cta { display: flex; justify-content: center; gap: 12px; margin: 12px; }
    .live-cta button { flex: 1; padding: 10px 14px; font-size: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
    .live-cta button:hover { opacity: 0.85; }
    #listenLiveBtn { color: #FDF9D8; }
    #donateBtn { background: #ffd54f; color: #111; }
    #xsen-audio-card { margin: 0 12px 12px; background: #1a1a1a; border-radius: 10px; padding: 12px; }
    .xsen-audio-header { color: #ff2d2d; font-weight: 700; font-size: 13px; margin-bottom: 8px; }
    #xsenAudio { width: 100%; height: 36px; }
    .xsen-audio-status { color: #aaa; font-size: 12px; margin-top: 6px; text-align: center; }
    .fan-message-panel { margin: 0 12px 12px; padding: 16px; background: #fff; border-radius: 14px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .fan-message-header { display: flex; justify-content: center; align-items: center; gap: 6px; font-weight: 800; font-size: 15px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid #f0e0e0; }
    .fan-message-panel input, .fan-message-panel textarea { width: 100%; margin: 8px 0; padding: 9px 11px; font-size: 14px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
    .fan-message-panel input:focus, .fan-message-panel textarea:focus { outline: none; }
    #sendFanMessage { width: 100%; margin-top: 10px; padding: 11px; color: #FDF9D8; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    #sendFanMessage:hover { opacity: 0.9; }
    .encryption-banner { display: flex; align-items: center; justify-content: center; gap: 6px; background: #1a1a2e; color: #00e676; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 6px 12px; border-radius: 6px; margin-bottom: 12px; text-transform: uppercase; }
    .encryption-banner span.lock-icon { font-size: 13px; }
    .fan-message-status { text-align: center; font-size: 13px; margin-top: 8px; min-height: 16px; color: #666; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; background: #fdfdfd; min-height: 300px; }
    .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 10px; max-width: 85%; line-height: 1.5; font-size: 14px; }
    .message.bot { background: #f0f0f0; color: #222; }
    .message.user { color: #FDF9D8; margin-left: auto; }
    .chat-input { display: flex; border-top: 1px solid #ddd; background: #fff; border-radius: 0 0 10px 10px; }
    .chat-input input { flex: 1; padding: 14px; border: none; font-size: 1rem; font-family: inherit; background: transparent; }
    .chat-input input:focus { outline: none; }
    .chat-input button { color: #FDF9D8; border: none; padding: 0 20px; font-size: 1.2rem; cursor: pointer; border-radius: 0 0 10px 0; transition: opacity 0.2s; }
    .chat-input button:hover { opacity: 0.9; }
    .nav-bar { display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #eee; background: #fafafa; border-radius: 0 0 10px 10px; }
    .nav-bar a { font-size: 12px; opacity: 0.7; transition: opacity 0.2s; }
    .nav-bar a:hover { opacity: 1; }
    .demo-banner { background: #1a1a2e; color: #F59E0B; font-size: 11px; font-weight: 700; text-align: center; padding: 6px; letter-spacing: 1px; text-transform: uppercase; }
    @media (max-width: 520px) {
      .chat-container { margin: 0; border-radius: 0; border: none; min-height: 100vh; }
      .chat-header { border-radius: 0; }
      .chat-input button { border-radius: 0; }
      .nav-bar { border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="chat-container">

    <div class="demo-banner">⚡ HopePal Platform Demo — Not a live ministry</div>

    <header class="chat-header" id="chatHeader">
      <span class="header-title" id="headerTitle">Loading…</span>
      <span id="liveBadge" class="live-badge offline">⚪ OFFLINE</span>
    </header>

    <div class="live-cta">
      <button id="listenLiveBtn" type="button">🔴 Listen Live</button>
      <button id="donateBtn" type="button">❤️ Support the Ministry</button>
    </div>

    <div id="xsen-audio-card" style="display:none;">
      <div class="xsen-audio-header">🔴 LIVE BROADCAST</div>
      <audio id="xsenAudio" preload="none" playsinline controls>
        <source src="" type="audio/mpeg" />
        Your browser does not support audio.
      </audio>
      <div id="audioStatus" class="xsen-audio-status">Tap ▶ to listen live</div>
    </div>

    <div class="fan-message-panel">
      <div class="fan-message-header" id="panelHeader">📡 Message the Ministry — 24/7</div>
      <div class="encryption-banner">
        <span class="lock-icon">🔐</span>
        <span id="encBannerText">AES-256 Encrypted — Direct to Ministry</span>
      </div>
      <p style="font-size:12px; color:#666; text-align:center; margin-bottom:10px;" id="panelSub">Prayer request, encouragement, or just checking in — we're always here.</p>
      <input type="text" id="fanName" placeholder="Your name or handle (optional)" />
      <textarea id="fanMessage" rows="3" placeholder="What's on your heart? We read every message…"></textarea>
      <button id="sendFanMessage" type="button">Send Message</button>
      <div id="fanMessageStatus" class="fan-message-status"></div>
    </div>

    <div id="messages" class="chat-messages">
      <div class="message bot" id="welcomeMsg">👋 Welcome! Loading…</div>
    </div>

    <form id="chatForm" class="chat-input">
      <input type="text" id="userInput" placeholder="Ask a question…" autocomplete="off" required />
      <button type="submit">➤</button>
    </form>

    <div class="nav-bar">
      <a href="/" id="homeLink">← HopePal Home</a>
      <a href="#" id="contactLink">Contact</a>
    </div>
  </div>

  <script>
    /* ============================================================
       HOPEPAL — PLATFORM DEMO CONFIG
       This is the generic demo at hopepal root.
       Branded client versions live in /otr/, /client2/, etc.
    ============================================================ */
    const CONFIG = {
      clientName:      "HopePal Ministry Demo",
      clientIcon:      "🙏",
      brandColor:      "#B45309",
      anonName:        "Anonymous",
      messageSource:   "HopePal Demo",
      contactEmail:    "hello@hopepal.com",
      donateUrl:       "https://peak-platforms.com",
      liveAudioStream: "",
      apiBase:         "",   // demo — no live backend
      encKey:          "",   // demo — no real encryption key
      welcomeMsg:      "👋 Welcome to the HopePal platform demo! This is what your branded ministry app will look like. Ready to deploy for your ministry? Visit hopepal.com to get started.",
      panelSubtext:    "This is a demo. Your branded deployment will send real encrypted messages directly to your ministry inbox.",
      encBannerText:   "AES-256 Encrypted — Not Stored — Direct to Your Ministry",
    };
    /* ============================================================
       END CONFIG
    ============================================================ */

    /* ── APPLY CONFIG TO DOM ── */
    document.getElementById('pageTitle').textContent           = CONFIG.clientName;
    document.getElementById('headerTitle').textContent         = `${CONFIG.clientIcon} ${CONFIG.clientName}`;
    document.getElementById('chatHeader').style.background     = CONFIG.brandColor;
    document.getElementById('listenLiveBtn').style.background  = CONFIG.brandColor;
    document.getElementById('sendFanMessage').style.background = CONFIG.brandColor;
    document.getElementById('encBannerText').textContent       = CONFIG.encBannerText;
    document.getElementById('panelSub').textContent            = CONFIG.panelSubtext;
    document.getElementById('welcomeMsg').textContent          = CONFIG.welcomeMsg;
    document.getElementById('contactLink').href                = `mailto:${CONFIG.contactEmail}`;
    document.getElementById('contactLink').textContent         = 'Contact';
    document.querySelector('.fan-message-header').style.color  = CONFIG.brandColor;

    document.addEventListener('DOMContentLoaded', () => {
      const messages      = document.getElementById('messages');
      const fanMsgInput   = document.getElementById('fanMessage');
      const sendFanMsgBtn = document.getElementById('sendFanMessage');
      const fanMsgStatus  = document.getElementById('fanMessageStatus');
      const form          = document.getElementById('chatForm');
      const input         = document.getElementById('userInput');
      const donateBtn     = document.getElementById('donateBtn');
      const listenLiveBtn = document.getElementById('listenLiveBtn');

      /* ── DEMO: simulate send ── */
      sendFanMsgBtn?.addEventListener('click', (e) => {
        e.preventDefault();
        const message = fanMsgInput?.value.trim();
        if (!message) { fanMsgStatus.textContent = 'Please enter a message.'; return; }
        fanMsgStatus.textContent = '✅ Demo only — in a live deployment this would be encrypted and sent to your ministry inbox.';
        fanMsgInput.value = '';
      });

      /* ── DEMO: chat bot ── */
      form?.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        addMsg(text, 'user');
        input.value = '';
        addMsg('🙏 This is a HopePal platform demo. In your live deployment, this can connect to a ministry AI or route to your chaplain team.', 'bot');
      });

      function addMsg(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        if (sender === 'user') div.style.background = CONFIG.brandColor;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      /* ── DEMO: live buttons ── */
      listenLiveBtn?.addEventListener('click', () => {
        addMsg('📻 Live broadcast integration is available in deployed ministries. This is a demo.', 'bot');
      });

      donateBtn?.addEventListener('click', () => {
        window.open(CONFIG.donateUrl, '_blank', 'noopener');
      });
    });
  </script>
</body>
</html>
